<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PM MVP</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        padding: 40px;
        background: #f7f8fb;
        color: #032147;
      }

      .card {
        max-width: 640px;
        padding: 24px;
        background: #ffffff;
        border-radius: 16px;
        box-shadow: 0 18px 40px rgba(3, 33, 71, 0.12);
      }

      .accent {
        display: inline-block;
        margin-bottom: 12px;
        padding: 6px 12px;
        border-radius: 999px;
        background: #ecad0a;
        color: #032147;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.2em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <span class="accent">Hello World</span>
      <h1>Kanban Studio</h1>
      <p>The backend is running and serving static HTML.</p>
      <p>Try the API: <code>/api/hello</code></p>
    </div>
  </body>
</html>
